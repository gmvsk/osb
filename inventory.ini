# =============================================================================
# inventory.ini
# Ansible inventory file — defines the OSB server target
# =============================================================================
[osb_server]
# Replace with your actual OSB server hostname or IP address.
# If Ansible runs ON the OSB server itself, use: localhost ansible_connection=local
osb-server.example.com ansible_user=your_ssh_username

[osb_server:vars]
# SSH connection settings
ansible_ssh_private_key_file=~/.ssh/id_rsa
# ansible_ssh_pass=your_ssh_password          # Uncomment if using password auth instead of key
# ansible_become_password=your_sudo_password   # Uncomment if sudo requires a password
